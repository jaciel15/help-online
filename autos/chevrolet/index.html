<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHEVROLET</title>

<style>

body{

    margin:0;

    padding:0;

    background:#050505;

    font-family:Arial;

    color:white;

}

.header{

    text-align:center;

    padding-top:50px;

}

.title{

    font-size:42px;

    color:#00ffe1;

    font-weight:bold;

    text-shadow:

        0 0 10px #00ffe1,

        0 0 20px #00ffe1,

        0 0 40px #00ffe1;

}

.subtitle{

    margin-top:10px;

    color:#999;

    font-size:18px;

}

.container{

    width:90%;

    max-width:500px;

    margin:auto;

    margin-top:50px;

}

.model{

    display:block;

    margin-bottom:22px;

    padding:24px;

    border-radius:22px;

    background:#111;

    border:2px solid #00ffe1;

    color:#00ffe1;

    text-decoration:none;

    text-align:center;

    font-size:28px;

    font-weight:bold;

    box-shadow:

        0 0 20px #00ffe144;

    transition:0.3s;

}

.model:hover{

    background:#00ffe1;

    color:black;

    transform:scale(1.03);

}

.footer{

    margin-top:80px;

    margin-bottom:30px;

    text-align:center;

    color:#555;

    font-size:13px;

}

</style>

</head>

<body>

<div class="header">

    <div class="title">

        CHEVROLET

    </div>

    <div class="subtitle">

        VELOCÍMETROS CDMX

    </div>

</div>

<div class="container">

    <a class="model" href="#">

        CRUZE

    </a>

    <a class="model" href="#">

        AVEO

    </a>

    <a class="model" href="#">

        SPARK

    </a>

    <a class="model" href="#">

        SILVERADO

    </a>

    <a class="model" href="#">

        SONIC

    </a>

    <a class="model" href="#">

        CAPTIVA

    </a>

    <a class="model" href="#">

        MALIBU

    </a>

</div>

<div class="footer">

    HELP ONLINE © VELOCÍMETROS CDMX

</div>

</body>

</html>
