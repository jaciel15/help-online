<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YAMAHA MT-09</title>

<style>

body{

    margin:0;

    padding:0;

    background:#050505;

    font-family:Arial;

    color:white;

}

/* HEADER */

.header{

    text-align:center;

    padding-top:40px;

}

.title{

    font-size:40px;

    color:#00ffe1;

    font-weight:bold;

    text-shadow:
        0 0 10px #00ffe1,
        0 0 20px #00ffe1,
        0 0 40px #00ffe1;

}

.subtitle{

    margin-top:10px;

    color:#999;

    font-size:18px;

}

/* INFO BOX */

.box{

    width:90%;

    max-width:600px;

    margin:auto;

    margin-top:35px;

    padding:25px;

    border-radius:22px;

    background:#111;

    border:2px solid #00ffe1;

    box-shadow:
        0 0 20px #00ffe133;

}

.label{

    color:#00ffe1;

    font-size:20px;

    font-weight:bold;

    margin-top:20px;

}

.value{

    margin-top:8px;

    color:#ddd;

    font-size:18px;

    line-height:1.8;

}

/* IMAGE */

.photo{

    width:100%;

    border-radius:18px;

    margin-top:20px;

    border:2px solid #00ffe1;

    box-shadow:
        0 0 20px #00ffe144;

}

/* FOOTER */

.footer{

    margin-top:80px;

    margin-bottom:30px;

    text-align:center;

    color:#555;

    font-size:13px;

}

</style>

</head>

<body>

<div class="header">

    <div class="title">

        YAMAHA MT-09

    </div>

    <div class="subtitle">

        HELP ONLINE SYSTEM

    </div>

</div>

<div class="box">

    <div class="label">
        EEPROM
    </div>

    <div class="value">
        93C83
    </div>

    <div class="label">
        PROGRAMADOR
    </div>

    <div class="value">
        UPA USB
    </div>

    <div class="label">
        TIPO
    </div>

    <div class="value">
        SERIAL EEPROM
    </div>

    <div class="label">
        NOTAS
    </div>

    <div class="value">
        • Lectura directa EEPROM<br>
        • Compatible con UPA USB<br>
        • Sistema kilometraje dashboard<br>
        • Plataforma Yamaha MT Series
    </div>

</div>

<div class="box">

    <div class="label">
        DASHBOARD
    </div>

    <img src="Dashboard.jpg" class="photo">

    <div class="label">
        EEPROM / MCU
    </div>

    <img src="eeprom.jpg" class="photo">

    <div class="label">
        CONEXIÓN
    </div>

    <img src="conexión.jpg" class="photo">

</div>

<div class="footer">

    HELP ONLINE © VELOCÍMETROS CDMX

</div>

</body>

</html>
